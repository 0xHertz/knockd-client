name: Build and Release

on:
  push:
    tags: ['v*', 'release-*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '9' }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
      - name: Install linuxdeploy (AppImage)
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
      - run: pnpm install
      - run: pnpm tauri build
      - run: ls -R src-tauri/target/release/bundle/ || true
      - run: ls -lh src-tauri/target/release/knockd-client
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/knockd-client

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '9' }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install vcpkg and OpenSSL
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install openssl:x64-windows-static
          echo "OPENSSL_DIR=${{ github.workspace }}\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=${{ github.workspace }}\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=${{ github.workspace }}\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
      - run: pnpm install
      - run: pnpm tauri build
      - shell: pwsh
        run: |
          Get-ChildItem -Recurse src-tauri/target/release/bundle/ -ErrorAction SilentlyContinue
          Get-ChildItem src-tauri/target/release/knockd-client.exe -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/knockd-client.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '9' }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install
      - name: Install OpenSSL (SQLCipher)
        run: brew install openssl@3
      - run: pnpm tauri build
      - run: ls -R src-tauri/target/release/bundle/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/knockd-client

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/release-')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - run: |
          zip -r extension.zip extension
          zip -r install.zip install
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-deb/**/*
            windows-installer/**/*
            macos-dmg/**/*
            extension.zip
            install.zip
